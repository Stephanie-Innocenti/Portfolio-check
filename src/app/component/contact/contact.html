<div class="wrapper">
  <div class="contact-section">
    <div class="contact-details">
      <p id="section-portfolio" class="small-paragraph">Get in Touch</p>
      <h1 class="section-title">Contact</h1>
      <div class="contact-info">
        <p class="contact-description">Any question can contact me.</p>
        <p class="contact-details">
          Phone:
          <a [href]="'tel: phone '">{{ phoneNumber }} </a>
          <br />
          email: <a [href]="'email: '">{{ email }} </a>
        </p>
      </div>
    </div>
    <form class="contact-form">
        <div class="form-group-contact">
            <label for = "name">Name: </label>
                <input type="text" id="name" name="name" required>
            
        </div>
        <div class="form-group-contact">
            <label for = "email">Email: </label>
                <input type="text" id="email" name="email" required>
        </div>
         <div class="form-group-contact">
            <label for = "messagge"> Message: </label>
                <textarea rows="4" id="message" name="message"  required></textarea>
        </div>
        <div class="btn-container">
        </div>
    </form>
  </div>
</div>
